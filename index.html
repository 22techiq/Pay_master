<!--FRONTEND CODE-->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Secure Payment</title>
<style>
body{font-family:Arial;background:#f4f6f9;display:flex;justify-content:center;align-items:center;height:100vh;}
.box{background:white;padding:30px;border-radius:10px;box-shadow:0 5px 15px rgba(0,0,0,0.1);width:300px;}
input,button{width:100%;padding:10px;margin:10px 0;}
button{background:#0a66c2;color:white;border:none;cursor:pointer;}
button:hover{background:#004182;}
</style>
</head>
<body>

<div class="box">
<h2>Pay Now</h2>
<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<input id="phone" placeholder="Phone">
<input id="amount" placeholder="Amount">
<button onclick="pay()">Pay</button>
<p id="msg"></p>
</div>

<script>
async function pay() {
  msg.innerText = "Processing...";

  const res = await fetch("https://script.google.com/macros/s/AKfycbx2LJDlHxuet2rzl-LVMulrG4T6pIgjuAvdocELziNTez4wkePD3Cgh5Qtewavb85sEug/exec", {
    method: "POST",
    body: JSON.stringify({
      type: "createPayment",
      name: name.value,
      email: email.value,
      phone: phone.value,
      amount: amount.value
    })
  });

  const data = await res.json();

  if (data.checkout_url) {
    window.location.href = data.checkout_url;
  } else {
    msg.innerText = "Payment failed";
  }
}
</script>

</body>
</html>
