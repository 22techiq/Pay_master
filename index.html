<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<title>M-Pesa STK Payment</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f') no-repeat center center/cover;
}

.overlay{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
}

.container{
  position:relative;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(15px);
  padding:40px;
  width:350px;
  border-radius:20px;
  text-align:center;
  color:#fff;
  box-shadow:0 20px 40px rgba(0,0,0,0.4);
}

.container h3{
  margin-bottom:20px;
  font-size:22px;
  letter-spacing:1px;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
  outline:none;
  font-size:14px;
}

button{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  background:#00c853;
  color:#fff;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#009624;
}

button:disabled{
  background:gray;
  cursor:not-allowed;
}

#status{
  margin-top:20px;
  font-size:14px;
  min-height:24px;
}

.spinner{
  border:4px solid rgba(255,255,255,0.3);
  border-top:4px solid #fff;
  border-radius:50%;
  width:18px;
  height:18px;
  animation:spin 1s linear infinite;
  display:inline-block;
  vertical-align:middle;
  margin-right:8px;
}

@keyframes spin{
  100%{ transform:rotate(360deg); }
}

.guide{
  margin-top:15px;
  font-size:12px;
  opacity:0.8;
}

.whatsapp-float{
  position:fixed;
  bottom:90px; /* keeps it above footer */
  right:20px;
  width:60px;
  height:60px;
  background:#25D366;
  color:#fff;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:28px;
  box-shadow:0 8px 20px rgba(0,0,0,0.4);
  transition:0.3s;
  z-index:1000;
  animation: pulse 2s infinite;
  text-decoration: none;
}

.whatsapp-float:hover{
  transform:scale(1.1);
  background:#1ebe5d;
}

@keyframes pulse{
  0%{ box-shadow:0 0 0 0 rgba(37,211,102,0.7); }
  70%{ box-shadow:0 0 0 15px rgba(37,211,102,0); }
  100%{ box-shadow:0 0 0 0 rgba(37,211,102,0); }
}

</style>
</head>

<body>

<div class="overlay"></div>

<div class="container">

<h3>M-Pesa STK Payment</h3>

<input id="name" placeholder="Full Name">
<input id="phone" placeholder="2547XXXXXXXX">
<input id="amount" placeholder="Amount">

<button id="payBtn" onclick="pay()">Pay Now</button>

<p id="status"></p>

<p class="guide">
After clicking <b>Pay Now</b>, check your phone.<br>
Enter your M-Pesa PIN to complete the transaction.<br>
Do not close this page while payment is processing.
</p>

</div>

<script>
let ref = null;
let status = document.getElementById("status");
let payBtn = document.getElementById("payBtn");

async function pay() {

  payBtn.disabled = true;
  status.innerHTML = '<span class="spinner"></span> Payment in progress... Sending STK push';

  const res = await fetch("https://script.google.com/macros/s/AKfycbw76qk3r4KMnp10S_edmvjIp3U0P8cOlk6oCH0Up2ANYPdpm_9dZ9DjIaMV8VE9kZp6UQ/exec", {
    method: "POST",
    body: JSON.stringify({
      type: "stkPush",
      name: name.value,
      phone: phone.value,
      amount: amount.value
    })
  });

  const data = await res.json();

  if (data.error) {
    status.innerText = "❌ Error: " + data.error;
    payBtn.disabled = false;
    return;
  }

  ref = data.reference;

  status.innerHTML = '<span class="spinner"></span> Check your phone and enter PIN...';

  pollStatus();
}

function pollStatus() {
  const interval = setInterval(async () => {

    const res = await fetch(
      "https://script.google.com/macros/s/AKfycbw76qk3r4KMnp10S_edmvjIp3U0P8cOlk6oCH0Up2ANYPdpm_9dZ9DjIaMV8VE9kZp6UQ/exec?reference=" + ref
    );

    const data = await res.json();

    if (data.status === "COMPLETE") {
      status.innerText = "✅ Payment Successful";
      payBtn.disabled = false;
      clearInterval(interval);
    }

    if (data.status === "FAILED") {
      status.innerText = "❌ Payment Failed";
      payBtn.disabled = false;
      clearInterval(interval);
    }

  }, 3000);
}
</script>

<script>
/* =================================
   1. Disable Right Click
================================= */
document.addEventListener("contextmenu", e => e.preventDefault());

/* =================================
   2. Disable Copy / Cut / Paste
================================= */
["copy", "cut", "paste", "dragstart"].forEach(evt => {
  document.addEventListener(evt, e => e.preventDefault());
});

/* =================================
   3. Block DevTools Shortcuts
================================= */
document.addEventListener("keydown", function (e) {
  if (
    e.key === "F12" ||
    (e.ctrlKey && e.shiftKey && ["I","J","C"].includes(e.key)) ||
    (e.ctrlKey && e.key === "U")
  ) {
    e.preventDefault();
    return false;
  }
});

/* =================================
   4. DevTools Size Detection
================================= */
setInterval(() => {
  const widthDiff  = window.outerWidth - window.innerWidth;
  const heightDiff = window.outerHeight - window.innerHeight;

  if (widthDiff > 160 || heightDiff > 160) {
    document.body.innerHTML =
      "<h2 style='color:red;margin-top:20%'>Access Denied</h2>";
  }
}, 1000);

/* =================================
   5. Console Open Detection
================================= */
(function () {
  const element = new Image();
  Object.defineProperty(element, "id", {
    get: function () {
      document.body.innerHTML =
        "<h2 style='color:red;margin-top:20%'>Inspection Blocked</h2>";
    }
  });
  console.log(element);
})();

/* =================================
   6. Anti-Debugger Trap
================================= */
setInterval(function () {
  debugger;
}, 2000);

/* =================================
   7. Hide Source via Visibility Change
================================= */
document.addEventListener("visibilitychange", function () {
  if (document.hidden) {
    document.body.style.display = "none";
  } else {
    document.body.style.display = "block";
  }
});

/* =================================
   8. Disable View Source via Mouse
================================= */
document.onmousedown = function (e) {
  if (e.button === 2) return false;
};
</script>

</body>
<a href="https://wa.me/254742955188" 
   class="whatsapp-float" 
   target="_blank">
   <i class="fab fa-whatsapp"></i>
</a>
</html>
