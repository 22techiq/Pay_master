<!--FRONTEND CODE-->
<!DOCTYPE html>
<html>
<body>

<h3>M-Pesa STK Payment</h3>

<input id="name" placeholder="Name"><br>
<input id="phone" placeholder="2547XXXXXXXX"><br>
<input id="amount" placeholder="Amount"><br>

<button onclick="pay()">Pay Now</button>
<p id="status"></p>

<script>
let ref = null;

async function pay() {

  status.innerText = "Sending STK push...";

  const res = await fetch("YOUR_WEB_APP_URL", {
    method: "POST",
    body: JSON.stringify({
      type: "stkPush",
      name: name.value,
      phone: phone.value,
      amount: amount.value
    })
  });

  const data = await res.json();

  if (data.error) {
    status.innerText = "Error: " + data.error;
    return;
  }

  ref = data.reference;

  status.innerText = "Check your phone and enter PIN...";

  pollStatus();
}

function pollStatus() {
  const interval = setInterval(async () => {

    const res = await fetch(
      "YOUR_WEB_APP_URL?reference=" + ref
    );

    const data = await res.json();

    if (data.status === "COMPLETE") {
      status.innerText = "✅ Payment Successful";
      clearInterval(interval);
    }

    if (data.status === "FAILED") {
      status.innerText = "❌ Payment Failed";
      clearInterval(interval);
    }

  }, 3000);
}
</script>

</body>
</html>
