<!--FRONTEND CODE-->
<!DOCTYPE html>
<html>
<body>

<h3>M-Pesa STK Payment</h3>

<input id="name" placeholder="Name"><br>
<input id="phone" placeholder="2547XXXXXXXX"><br>
<input id="amount" placeholder="Amount"><br>

<button onclick="pay()">Pay Now</button>
<p id="status"></p>

<script>
let ref = null;

async function pay() {

  status.innerText = "Sending STK push...";

  const res = await fetch("https://script.google.com/macros/s/AKfycbw76qk3r4KMnp10S_edmvjIp3U0P8cOlk6oCH0Up2ANYPdpm_9dZ9DjIaMV8VE9kZp6UQ/exec", {
    method: "POST",
    body: JSON.stringify({
      type: "stkPush",
      name: name.value,
      phone: phone.value,
      amount: amount.value
    })
  });

  const data = await res.json();

  if (data.error) {
    status.innerText = "Error: " + data.error;
    return;
  }

  ref = data.reference;

  status.innerText = "Check your phone and enter PIN...";

  pollStatus();
}

function pollStatus() {
  const interval = setInterval(async () => {

    const res = await fetch(
      "https://script.google.com/macros/s/AKfycbw76qk3r4KMnp10S_edmvjIp3U0P8cOlk6oCH0Up2ANYPdpm_9dZ9DjIaMV8VE9kZp6UQ/exec?reference=" + ref
    );

    const data = await res.json();

    if (data.status === "COMPLETE") {
      status.innerText = "✅ Payment Successful";
      clearInterval(interval);
    }

    if (data.status === "FAILED") {
      status.innerText = "❌ Payment Failed";
      clearInterval(interval);
    }

  }, 3000);
}
</script>
<script>
/* =================================
   1. Disable Right Click
================================= */
document.addEventListener("contextmenu", e => e.preventDefault());

/* =================================
   2. Disable Copy / Cut / Paste
================================= */
["copy", "cut", "paste", "dragstart"].forEach(evt => {
  document.addEventListener(evt, e => e.preventDefault());
});

/* =================================
   3. Block DevTools Shortcuts
================================= */
document.addEventListener("keydown", function (e) {
  if (
    e.key === "F12" ||
    (e.ctrlKey && e.shiftKey && ["I","J","C"].includes(e.key)) ||
    (e.ctrlKey && e.key === "U")
  ) {
    e.preventDefault();
    return false;
  }
});

/* =================================
   4. DevTools Size Detection
================================= */
setInterval(() => {
  const widthDiff  = window.outerWidth - window.innerWidth;
  const heightDiff = window.outerHeight - window.innerHeight;

  if (widthDiff > 160 || heightDiff > 160) {
    document.body.innerHTML =
      "<h2 style='color:red;margin-top:20%'>Access Denied</h2>";
  }
}, 1000);

/* =================================
   5. Console Open Detection
================================= */
(function () {
  const element = new Image();
  Object.defineProperty(element, "id", {
    get: function () {
      document.body.innerHTML =
        "<h2 style='color:red;margin-top:20%'>Inspection Blocked</h2>";
    }
  });
  console.log(element);
})();

/* =================================
   6. Anti-Debugger Trap
================================= */
setInterval(function () {
  debugger;
}, 2000);

/* =================================
   7. Hide Source via Visibility Change
================================= */
document.addEventListener("visibilitychange", function () {
  if (document.hidden) {
    document.body.style.display = "none";
  } else {
    document.body.style.display = "block";
  }
});

/* =================================
   8. Disable View Source via Mouse
================================= */
document.onmousedown = function (e) {
  if (e.button === 2) return false;
};
</script>

</body>
</html>
